<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدیا سنتر</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="lib/font-awesome.min.css">
  <link rel="stylesheet" href="lib/sweetalert2.min.css">
  <style>
    @font-face {
      font-family: 'IRANSansXFaNum';
      src: url('lib/fonts/IRANSansXFaNum-Regular.woff2') format('woff2'),
           url('lib/fonts/IRANSansXFaNum-Regular.woff') format('woff'),
           url('lib/fonts/IRANSansXFaNum-Regular.ttf') format('truetype');
      font-weight: normal;
    }
    @font-face {
      font-family: 'IRANSansXFaNum';
      src: url('lib/fonts/IRANSansXFaNum-Bold.woff2') format('woff2'),
           url('lib/fonts/IRANSansXFaNum-Bold.woff') format('woff'),
           url('lib/fonts/IRANSansXFaNum-Bold.ttf') format('truetype');
      font-weight: bold;
    }
    * { font-family: 'IRANSansXFaNum', Tahoma, sans-serif; }
  </style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-header"><i class="fas fa-film"></i><h1>مدیا سنتر</h1></div>
    <div class="sidebar-nav">
      <button class="sidebar-btn" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>داشبورد</span></button>
      <button class="sidebar-btn" data-page="sales"><i class="fas fa-shopping-cart"></i><span>فروش</span></button>
      <button class="sidebar-btn" data-page="sales-list"><i class="fas fa-list-ul"></i><span>لیست فروش</span></button>

      <button class="sidebar-btn group-toggle" data-group="movies">
        <span><i class="fas fa-video"></i> فیلم‌ها</span><span class="arrow"><i class="fas fa-chevron-down"></i></span>
      </button>
      <div class="submenu" data-group="movies">
        <button class="sidebar-btn sub-item" data-page="movies-iranian"><i class="fas fa-flag-checkered"></i> ایرانی</button>
        <button class="sidebar-btn sub-item" data-page="movies-foreign"><i class="fas fa-globe"></i> خارجی</button>
        <button class="sidebar-btn sub-item" data-page="movies-animation"><i class="fas fa-dragon"></i> انیمیشن</button>
        <button class="sidebar-btn sub-item" data-page="movies-korean"><i class="fas fa-music"></i> کره‌ای</button>
        <button class="sidebar-btn sub-item" data-page="movies-indian"><i class="fas fa-pepper-hot"></i> هندی</button>
        <button class="sidebar-btn sub-item" data-page="movies-other"><i class="fas fa-folder-open"></i> متفرقه</button>
      </div>

      <button class="sidebar-btn group-toggle" data-group="series">
        <span><i class="fas fa-tv"></i> سریال‌ها</span><span class="arrow"><i class="fas fa-chevron-down"></i></span>
      </button>
      <div class="submenu" data-group="series">
        <button class="sidebar-btn sub-item" data-page="series-iranian"><i class="fas fa-flag-checkered"></i> ایرانی</button>
        <button class="sidebar-btn sub-item" data-page="series-foreign"><i class="fas fa-globe"></i> خارجی</button>
        <button class="sidebar-btn sub-item" data-page="series-animation"><i class="fas fa-dragon"></i> انیمیشن</button>
        <button class="sidebar-btn sub-item" data-page="series-korean"><i class="fas fa-music"></i> کره‌ای</button>
        <button class="sidebar-btn sub-item" data-page="series-indian"><i class="fas fa-pepper-hot"></i> هندی</button>
        <button class="sidebar-btn sub-item" data-page="series-other"><i class="fas fa-folder-open"></i> متفرقه</button>
      </div>

      <button class="sidebar-btn" data-page="settings"><i class="fas fa-cog"></i><span>تنظیمات</span></button>
    </div>
  </nav>
  <main id="content"></main>
</div>
<script src="lib/sweetalert2.min.js"></script>
<script src="renderer.js"></script>
</body>
</html>
